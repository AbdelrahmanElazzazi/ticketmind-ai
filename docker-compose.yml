services:

  ai-api:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: ticketmind-api

    ports:
      - "8001:8000"

    env_file:
      - ./.env

    volumes:
      - .:/app

    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest

    container_name: ticketmind-prometheus

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"

    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml

    ports:
      - "9090:9090"

    depends_on:
      - ai-api

  grafana:
    image: grafana/grafana-oss:latest

    container_name: ticketmind-grafana

    ports:
      - "3001:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana-storage:/var/lib/grafana

    depends_on:
      - prometheus

volumes:
  grafana-storage: